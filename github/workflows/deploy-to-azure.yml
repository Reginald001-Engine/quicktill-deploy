name: Deploy to Azure - Blue Green

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy-staging:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      run: |
        docker build --platform linux/amd64 -t reginald001/quicktill-demo:latest .
        docker push reginald001/quicktill-demo:latest

    - name: Deploy to Staging Slot
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'quicktill-prod'
        slot-name: 'staging'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_STAGING }}

    - name: Health Check Staging
      run: sleep 30 # wait for app to start

    - name: Swap to Production
      run: az webapp deployment slot swap --name quicktill-prod --resource-group rg-quicktill --slot staging --target-slot production
